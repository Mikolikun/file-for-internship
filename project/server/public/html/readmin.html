                <!DOCTYPE html>
<html lang="en">
<head>

    <title>Music store</title>
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
    <nav>
        <div class="container">
            <div class="nav-con">
                <div class="logo">
                    <a href="#">Music store</a>
                </div>
                <ul class="menu">
                    <li><a href="/html/index.html">หน้าหลัก</a></li>

<div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h2>เพื่มสมาชิก admin</h2>
                <p>ยินดีต้อนรับกลับเข้าสู่ Music Store ฝ่าย admin</p>
            </div>

            <form action="http://localhost:3000/login" method="post">
                <div class="input-group">
                    <label for="username">username</label>
                    <input type="text" id="username" placeholder="กรอกชื่อผู้ใช้ของคุณ" required>
                </div>

                <div class="input-group">
                    <label for="password">รหัสผ่าน</label>
                    <input type="password" id="password" placeholder="กรอกรหัสผ่าน" required>
                </div>

                <div class="input-group">
                    <label for="pin">pin 6 หลัก</label>
                    <input type="text" id="pin" placeholder="กรอกpin 6 หลัก" required>
                </div>

                <button type="submit" class="admin-btn">เพื่มสมาชิก</button>


            </form>
        </div>
    </div>

</body>
